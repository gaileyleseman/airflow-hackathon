version: 2

models:
  - name: stg_citizens
    description: "Staged citizen records with JSONB payload unpacked into typed columns"
    columns:
      - name: citizen_id
        description: "Unique identifier for the citizen"
        tests:
          - not_null
          - unique
      - name: full_name
        description: "Full name of the citizen"
      - name: date_of_birth
        description: "Date of birth"
      - name: municipality
        description: "Municipality of residence"
      - name: registration_date
        description: "Date of registration"
      - name: status
        description: "Account status: active, inactive, or suspended"
      - name: service_tier
        description: "Service tier: basic, standard, or premium"
      - name: email_verified
        description: "Whether email has been verified"
      - name: national_id_hash
        description: "SHA256 hash of national ID"
      - name: ingested_at
        description: "Timestamp when record was ingested"

  - name: stg_logins
    description: "Staged login records with JSONB payload unpacked into typed columns"
    columns:
      - name: login_id
        description: "Unique identifier for the login attempt"
        tests:
          - not_null
          - unique
      - name: citizen_id
        description: "Reference to the citizen who attempted login"
        tests:
          - not_null
      - name: logged_in_at
        description: "Timestamp of login attempt"
      - name: logged_out_at
        description: "Timestamp of logout, null if session abandoned"
      - name: session_duration_seconds
        description: "Duration of session in seconds"
      - name: device_type
        description: "Device type: desktop, mobile, tablet, or unknown"
      - name: success
        description: "Whether login was successful"
      - name: failure_reason
        description: "Reason for failure if unsuccessful"
      - name: ip_region
        description: "Region inferred from IP address"
      - name: ingested_at
        description: "Timestamp when record was ingested"
