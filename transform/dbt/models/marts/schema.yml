version: 2

models:
  - name: mart_citizens
    description: "Enriched citizen profiles"
    columns:
      - name: citizen_id
        description: "Unique identifier for the citizen"
        tests:
          - not_null
          - unique
      - name: full_name
        description: "Full name of the citizen"
      - name: date_of_birth
        description: "Date of birth"
      - name: age
        description: "Calculated age in years"
      - name: age_group
        description: "Age group classification: young, middle_aged, senior"
      - name: municipality
        description: "Municipality of residence"
      - name: registration_date
        description: "Date the citizen registered"
      - name: years_registered
        description: "Years since registration"
      - name: status
        description: "Account status"
      - name: is_active
        description: "Whether the citizen account is active"
      - name: service_tier
        description: "Service tier level"
      - name: email_verified
        description: "Whether the citizen's email is verified"

  - name: mart_logins
    description: "Login events enriched with citizen context"
    columns:
      - name: login_id
        description: "Unique identifier for the login attempt"
        tests:
          - not_null
          - unique
      - name: citizen_id
        description: "Reference to the citizen"
        tests:
          - not_null
      - name: full_name
        description: "Full name of the citizen"
      - name: municipality
        description: "Municipality of the citizen"
      - name: age_group
        description: "Age group of the citizen"
      - name: service_tier
        description: "Service tier of the citizen"
      - name: logged_in_at
        description: "Timestamp of login attempt"
      - name: logged_out_at
        description: "Timestamp of logout"
      - name: session_duration_seconds
        description: "Duration of the session in seconds"
      - name: device_type
        description: "Device type used for login"
      - name: success
        description: "Whether login was successful"
      - name: failure_reason
        description: "Reason for login failure, if applicable"
      - name: ip_region
        description: "Region inferred from IP"
      - name: login_hour
        description: "Hour of day when login occurred (0-23)"
      - name: login_day_of_week
        description: "Day of week when login occurred"
