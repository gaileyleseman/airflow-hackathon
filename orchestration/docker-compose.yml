# Shared config block — avoids repeating env vars and volumes across services
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: orchestration/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://hackathon:hackathon@postgres:5432/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme-set-in-env}
  env_file: .env
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - /var/run/docker.sock:/var/run/docker.sock
  networks: [hackathon-network]
  depends_on:
    airflow-init:
      condition: service_completed_successfully

services:
  airflow-init:
    build:
      context: .
      dockerfile: orchestration/Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://hackathon:hackathon@postgres:5432/airflow
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    entrypoint:
      - /bin/bash
      - -c
      - >-
        airflow db migrate &&
        airflow fab-db migrate &&
        (airflow users create --username admin --password admin
        --firstname Admin --lastname User
        --role Admin --email admin@localhost || true)
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hackathon-network]

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports: ["8081:8080"]

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
